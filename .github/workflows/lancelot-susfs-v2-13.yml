name: Lancelot KSU/SUSFS Supported A13 Kernel

on:
  workflow_dispatch:
  push:

jobs:
  build:
    name: Build kernel with KernelSU+SUSFS support for Redmi 9 (lancelot)
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Preparing build environment
      run: |
        echo "BUILD_TIME=$(TZ=Europe/Moscow date "+%Y%m%d%H%M")" >> $GITHUB_ENV

        sudo apt update

        sudo apt install -y \
          git ccache automake flex lzop bison gperf build-essential \
          zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 \
          libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools \
          pngcrush schedtool dpkg-dev liblz4-tool make optipng \
          maven libssl-dev pwgen libswitch-perl policycoreutils \
          minicom libxml-sax-base-perl libxml-simple-perl bc \
          libc6-dev-i386 lib32ncurses-dev libx11-dev lib32z1-dev \
          libgl1-mesa-dev xsltproc unzip device-tree-compiler \
          python2 python3

        mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    - name: Cloning Proton Clang
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone https://github.com/kdrag0n/proton-clang --depth=1

    - name: Cloning kernel tree
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone \
          https://github.com/crdroidandroid/android_kernel_xiaomi_mt6768 \
          -b 13.0 android-kernel --depth=1

    - name: Setup KernelSU with SUSFS (via SukiSU-Ultra)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        # 使用 SukiSU-Ultra 的 setup.sh（内置 SUSFS 支持，自动处理 SELinux 头文件）
        curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/main/kernel/setup.sh" | bash

        # 修复 MODULE_IMPORT_NS 兼容性 (kernel 4.14 不支持此宏)
        sed -i 's/^MODULE_IMPORT_NS.*$/\/\* MODULE_IMPORT_NS not supported on 4.14 - removed \*\//' drivers/kernelsu/ksu.c || true

        # 修复 allowlist.c 兼容性问题 (kernel 4.14)
        # 1. TWA_RESUME 在 4.14 中不存在(task_work_add 第三个参数用 true)
        sed -i 's/TWA_RESUME/true/' drivers/kernelsu/allowlist.c || true
        # 2. put_task_struct 需要 include <linux/sched/task.h>
        if ! grep -q 'linux/sched/task.h' drivers/kernelsu/allowlist.c; then
          sed -i '1s/^/#include <linux\/sched\/task.h>\n/' drivers/kernelsu/allowlist.c
        fi

        # 修复 app_profile.c: seccomp.filter_count 在 4.14 中不存在
        sed -i 's/atomic_set(\&.*seccomp\.filter_count.*);$/\/\* seccomp.filter_count not in 4.14 \*\//' drivers/kernelsu/app_profile.c || true

        # 修复 sucompat.c: linux/pgtable.h 在 4.14 中不存在
        sed -i 's/#include <linux\/pgtable.h>/#include <asm\/pgtable.h>/' drivers/kernelsu/sucompat.c || true
        # strncpy_from_user_nofault 在 4.14 中不存在 (4.19+)
        sed -i 's/strncpy_from_user_nofault/strncpy_from_user/g' drivers/kernelsu/sucompat.c || true

    - name: Apply SUSFS kernel patches
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel

        # 复制 SUSFS 源文件和头文件
        cp $GITHUB_WORKSPACE/susfs_files/susfs.c fs/
        cp $GITHUB_WORKSPACE/susfs_files/susfs.h include/linux/

        # 添加 SUSFS 到 fs/Makefile
        grep -q 'susfs.o' fs/Makefile || \
          echo 'obj-$(CONFIG_KSU_SUSFS) += susfs.o' >> fs/Makefile

        # 添加 SUSFS Kconfig
        grep -q 'config KSU_SUSFS' fs/Kconfig || {
          echo "" >> fs/Kconfig
          echo "config KSU_SUSFS" >> fs/Kconfig
          echo "    bool \"KernelSU SUSFS\"" >> fs/Kconfig
          echo "    default y" >> fs/Kconfig
        }

        # 应用 SUSFS 内核补丁
        patch -p1 -F 3 < \
          $GITHUB_WORKSPACE/susfs_files/10_enable_susfs_for_ksu.patch || true

        patch -p1 -F 3 < \
          $GITHUB_WORKSPACE/susfs_files/50_add_susfs_in_kernel-4.14.patch || true

        # 修复 open.c 中的 rejected hunks
        if [ -f "fs/open.c.rej" ]; then
          grep -q 'susfs_sus_path_by_filename' fs/open.c || {
            sed -i '/unsigned int lookup_flags = LOOKUP_FOLLOW;$/a #ifdef CONFIG_KSU_SUSFS_SUS_PATH' fs/open.c
            sed -i '/#ifdef CONFIG_KSU_SUSFS_SUS_PATH$/a         struct filename *fname;' fs/open.c
            sed -i '/struct filename \*fname;$/a                 int status;' fs/open.c
            sed -i '/int status;$/a                             int error;' fs/open.c
            sed -i '/int error;$/a                              #endif' fs/open.c
          }

          grep -q 'getname_safe' fs/open.c || {
            sed -i '/if (mode & ~S_IRWXO)/i #ifdef CONFIG_KSU_SUSFS_SUS_PATH' fs/open.c
            sed -i '/#ifdef CONFIG_KSU_SUSFS_SUS_PATH$/a         fname = getname_safe(filename);' fs/open.c
            sed -i '/fname = getname_safe(filename);$/a          status = susfs_sus_path_by_filename(fname, \&error, SYSCALL_FAMILY_ALL_ENOENT);' fs/open.c
            sed -i '/status = susfs_sus_path_by_filename/a       putname_safe(fname);' fs/open.c
            sed -i '/putname_safe(fname);$/a                     if (status) {' fs/open.c
            sed -i '/if (status) {$/a                                return error;' fs/open.c
            sed -i '/    return error;$/a                        }' fs/open.c
            sed -i '/^}$/a #endif' fs/open.c
          }
          rm -f fs/open.c.rej
        fi

        # 修复 path_umount 未导出问题（SUSFS 需要调用此内部函数）
        if [ -f fs/internal.h ]; then
          grep -q 'path_umount' fs/internal.h || \
            echo 'extern int path_umount(struct path *path, int flags);' >> fs/internal.h
        fi

    - name: Configure kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel

        DEFCONFIG=arch/arm64/configs/lancelot_defconfig

        # 添加 KernelSU + SUSFS 配置
        for cfg in \
          CONFIG_KSU=y \
          CONFIG_KSU_DEBUG=y \
          CONFIG_KSU_SUSFS=y \
          CONFIG_KSU_SUSFS_SUS_PATH=y \
          CONFIG_KSU_SUSFS_SUS_MOUNT=y \
          CONFIG_KSU_SUSFS_SUS_KSTAT=y \
          CONFIG_KSU_SUSFS_SUS_MAPS=y \
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y \
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y \
          CONFIG_KSU_SUSFS_ENABLE_LOG=y \
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y \
          CONFIG_OVERLAY_FS=y \
          CONFIG_KALLSYMS=y \
          CONFIG_KALLSYMS_ALL=y; do
          grep -q "$cfg" "$DEFCONFIG" || echo "$cfg" >> "$DEFCONFIG"
        done

    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel

        export PATH=$GITHUB_WORKSPACE/kernel_workspace/proton-clang/bin:$PATH
        export KBUILD_BUILD_HOST=github
        export KBUILD_BUILD_USER=BadSoul_SFC

        make -j$(nproc --all) \
          CC=clang \
          O=out \
          ARCH=arm64 \
          LD=ld.lld \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          lancelot_defconfig

        make -j$(nproc --all) \
          CC=clang \
          O=out \
          ARCH=arm64 \
          LD=ld.lld \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: Verify kernel output
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        if [ ! -f android-kernel/out/arch/arm64/boot/Image.gz-dtb ]; then
          echo "ERROR: Kernel Image.gz-dtb not found!"
          exit 1
        fi
        echo "Kernel build successful!"

    - name: Creating update.zip (AnyKernel3)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace

        git clone https://github.com/osm0sis/AnyKernel3 \
          --depth=1 AnyKernel3

        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        sed -i 's|BLOCK=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;|BLOCK=auto;|g' AnyKernel3/anykernel.sh
        sed -i 's/is_slot_device=0;/is_slot_device=auto;/g' AnyKernel3/anykernel.sh

        cp android-kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
        rm -rf AnyKernel3/.git* AnyKernel3/README.md

    - name: Uploading update.zip
      uses: actions/upload-artifact@v4
      with:
        name: KSU-SUSFS-${{ env.BUILD_TIME }}-lancelot-13
        path: kernel_workspace/AnyKernel3/*
