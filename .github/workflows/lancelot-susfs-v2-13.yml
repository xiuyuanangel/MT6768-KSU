name: Lancelot KSU/SUSFS Supported A13 Kernel

on:
  workflow_dispatch:
  push:

jobs:
  build:
    name: Build kernel with KernelSU+SUSFS support for Redmi 9 (lancelot)
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Preparing build environment
      run: |
        echo "BUILD_TIME=$(TZ=Europe/Moscow date "+%Y%m%d%H%M")" >> $GITHUB_ENV

        sudo apt update

        sudo apt install -y \
          git ccache automake flex lzop bison gperf build-essential \
          zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 \
          libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools \
          pngcrush schedtool dpkg-dev liblz4-tool make optipng \
          maven libssl-dev pwgen libswitch-perl policycoreutils \
          minicom libxml-sax-base-perl libxml-simple-perl bc \
          libc6-dev-i386 lib32ncurses-dev libx11-dev lib32z1-dev \
          libgl1-mesa-dev xsltproc unzip device-tree-compiler \
          python2 python3

        mkdir -p $GITHUB_WORKSPACE/action_dir

    - name: Cloning Proton Clang
      run: |
        cd $GITHUB_WORKSPACE/action_dir
        git clone https://github.com/kdrag0n/proton-clang --depth=1

    - name: Cloning kernel tree
      run: |
        cd $GITHUB_WORKSPACE/action_dir

        git clone \
          https://github.com/crdroidandroid/android_kernel_xiaomi_mt6768 \
          -b 13.0 kernel_tree --depth=1

    - name: Installing KernelSU v1.0.5 (non-GKI compatible)
      run: |
        cd $GITHUB_WORKSPACE/action_dir/kernel_tree

        git clone https://github.com/tiann/KernelSU \
          --depth=1 \
          --branch v1.0.5 \
          KernelSU_src

        cp KernelSU_src/kernel/*.c kernel/
        cp KernelSU_src/kernel/*.h kernel/
        cp -r KernelSU_src/kernel/selinux kernel/
        cp -r KernelSU_src/kernel/include kernel/

        # 防止重复写入
        grep -q 'config KSU' kernel/Kconfig || {
          echo "" >> kernel/Kconfig
          echo "config KSU" >> kernel/Kconfig
          echo "    bool \"KernelSU\"" >> kernel/Kconfig
          echo "    default y" >> kernel/Kconfig
          echo "" >> kernel/Kconfig
          echo "config KSU_DEBUG" >> kernel/Kconfig
          echo "    bool \"KernelSU debug mode\"" >> kernel/Kconfig
          echo "    default n" >> kernel/Kconfig
        }

        # 修复 SELinux include 问题
        grep -q 'security/selinux/include' kernel/Makefile || {
          echo "" >> kernel/Makefile
          echo "ccflags-y += -I\$(srctree)/security/selinux" >> kernel/Makefile
          echo "ccflags-y += -I\$(srctree)/security/selinux/include" >> kernel/Makefile
          echo "ccflags-y += -I\$(srctree)/security/selinux/ss" >> kernel/Makefile
          echo "ccflags-y += -I\$(srctree)/kernel" >> kernel/Makefile
          echo "" >> kernel/Makefile
          echo "ccflags-y += -DCONFIG_KSU" >> kernel/Makefile
          echo "ccflags-y += -DCONFIG_KSU_WITH_KPROBES" >> kernel/Makefile
          echo "ccflags-y += -DKSU_VERSION=10500" >> kernel/Makefile
          echo "ccflags-y += -Wno-implicit-function-declaration" >> kernel/Makefile
          echo "ccflags-y += -Wno-strict-prototypes" >> kernel/Makefile
          echo "ccflags-y += -Wno-int-conversion" >> kernel/Makefile
          echo "ccflags-y += -Wno-gcc-compat" >> kernel/Makefile
          echo "ccflags-y += -Wno-declaration-after-statement" >> kernel/Makefile
          echo "ccflags-y += -Wno-unused-variable" >> kernel/Makefile
          echo "" >> kernel/Makefile
          echo "obj-y += core_hook.o ksu.o allowlist.o apk_sign.o throne_tracker.o sucompat.o embed_ksud.o kernel_compat.o" >> kernel/Makefile
        }

        wget -P $GITHUB_WORKSPACE/ \
          https://raw.githubusercontent.com/xiaoleGun/KernelSU_Action/main/patches/patches.sh

        bash $GITHUB_WORKSPACE/patches.sh

        # 修复 MODULE_IMPORT_NS 兼容性问题 (kernel 4.14 不支持)
        cd $GITHUB_WORKSPACE/action_dir/kernel_tree
        if [ -f kernel/ksu.c ]; then
          # 方法1: 直接注释掉 MODULE_IMPORT_NS 调用 (更简单可靠)
          sed -i 's/^MODULE_IMPORT_NS.*$/\/\* & \*\//' kernel/ksu.c || true
        fi

    - name: Patching kernel tree for SUSFS support
      run: |
        cd $GITHUB_WORKSPACE/action_dir/kernel_tree

        # 复制 SUSFS 源文件到正确位置
        cp $GITHUB_WORKSPACE/susfs_files/susfs.c fs/
        cp $GITHUB_WORKSPACE/susfs_files/susfs.h include/linux/

        grep -q 'susfs.o' fs/Makefile || \
          echo 'obj-$(CONFIG_KSU_SUSFS) += susfs.o' >> fs/Makefile

        grep -q 'config KSU_SUSFS' fs/Kconfig || {
          echo "" >> fs/Kconfig
          echo "config KSU_SUSFS" >> fs/Kconfig
          echo "    bool \"KernelSU SUSFS\"" >> fs/Kconfig
          echo "    default y" >> fs/Kconfig
        }

        # 应用补丁文件（使用正确的路径）
        patch -p1 -F 3 < \
          $GITHUB_WORKSPACE/susfs_files/10_enable_susfs_for_ksu.patch || true

        patch -p1 -F 3 < \
          $GITHUB_WORKSPACE/susfs_files/50_add_susfs_in_kernel-4.14.patch || true

        # 修复 open.c reject（链式单行 sed 避免 YAML 多行解析问题）
        if [ -f "fs/open.c.rej" ]; then

          grep -q 'susfs_sus_path_by_filename' fs/open.c || {
            sed -i '/unsigned int lookup_flags = LOOKUP_FOLLOW;$/a #ifdef CONFIG_KSU_SUSFS_SUS_PATH' fs/open.c
            sed -i '/#ifdef CONFIG_KSU_SUSFS_SUS_PATH$/a struct filename *fname;' fs/open.c
            sed -i '/struct filename \*fname;$/a int status;' fs/open.c
            sed -i '/int status;$/a int error;' fs/open.c
            sed -i '/int error;$/a #endif' fs/open.c
          }

          grep -q 'getname_safe' fs/open.c || {
            sed -i '/if (mode & ~S_IRWXO)/i #ifdef CONFIG_KSU_SUSFS_SUS_PATH' fs/open.c
            sed -i '/#ifdef CONFIG_KSU_SUSFS_SUS_PATH$/a fname = getname_safe(filename);' fs/open.c
            sed -i '/fname = getname_safe(filename);$/a status = susfs_sus_path_by_filename(fname, \&error, SYSCALL_FAMILY_ALL_ENOENT);' fs/open.c
            sed -i '/status = susfs_sus_path_by_filename/a putname_safe(fname);' fs/open.c
            sed -i '/putname_safe(fname);$/a if (status) {' fs/open.c
            sed -i '/if (status) {$/a     return error;' fs/open.c
            sed -i '/    return error;$/a }' fs/open.c
            sed -i '/^}$/a #endif' fs/open.c
          }

          rm -f fs/open.c.rej
        fi

        grep -q 'CONFIG_KSU=y' arch/arm64/configs/lancelot_defconfig || echo 'CONFIG_KSU=y' >> arch/arm64/configs/lancelot_defconfig

        grep -q 'CONFIG_KSU_SUSFS=y' arch/arm64/configs/lancelot_defconfig || echo 'CONFIG_KSU_SUSFS=y' >> arch/arm64/configs/lancelot_defconfig

        for cfg in \
          CONFIG_KSU_SUSFS_SUS_PATH=y \
          CONFIG_KSU_SUSFS_SUS_MOUNT=y \
          CONFIG_KSU_SUSFS_SUS_KSTAT=y \
          CONFIG_KSU_SUSFS_SUS_MAPS=y \
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y \
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y \
          CONFIG_KSU_SUSFS_ENABLE_LOG=y \
          CONFIG_OVERLAY_FS=y \
          CONFIG_KALLSYMS=y \
          CONFIG_KALLSYMS_ALL=y; do
          grep -q "$cfg" arch/arm64/configs/lancelot_defconfig || echo "$cfg" >> arch/arm64/configs/lancelot_defconfig
        done

    - name: Generate SELinux headers (flask.h)
      run: |
        chmod +x $GITHUB_WORKSPACE/susfs_files/generate_flask.sh
        $GITHUB_WORKSPACE/susfs_files/generate_flask.sh $GITHUB_WORKSPACE/action_dir/kernel_tree

    - name: Building kernel
      run: |
        cd $GITHUB_WORKSPACE/action_dir/kernel_tree

        export PATH=$GITHUB_WORKSPACE/action_dir/proton-clang/bin:$PATH
        export KBUILD_BUILD_HOST=github
        export KBUILD_BUILD_USER=BadSoul_SFC

        make -j$(nproc --all) \
          CC=clang \
          O=out \
          ARCH=arm64 \
          LD=ld.lld \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
          lancelot_defconfig

        make -j$(nproc --all) \
          CC=clang \
          O=out \
          ARCH=arm64 \
          LD=ld.lld \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: Creating update.zip (AnyKernel3)
      run: |
        cd $GITHUB_WORKSPACE/action_dir

        git clone https://github.com/osm0sis/AnyKernel3 \
          --depth=1 AnyKernel3

        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        sed -i 's|BLOCK=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;|BLOCK=auto;|g' AnyKernel3/anykernel.sh
        sed -i 's/is_slot_device=0;/is_slot_device=auto;/g' AnyKernel3/anykernel.sh

        cp kernel_tree/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/

        rm -rf AnyKernel3/.git* AnyKernel3/README.md

    - name: Uploading update.zip
      uses: actions/upload-artifact@v4
      with:
        name: KSU-SUSFS-${{ env.BUILD_TIME }}-lancelot-13
        path: action_dir/AnyKernel3/*