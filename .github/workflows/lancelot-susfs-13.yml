name: Lancelot KSU/SUSFS Supported A13 Kernel from CRDroid
on:
  schedule:
  - cron: "0 0 * * 6"
  workflow_dispatch:
  push:

jobs:
  build:
    name: Build kernel with KernelSU+SUSFS support for Redmi 9 (lancelot)
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Preparing build environment
      run: |
        echo "BUILD_TIME=$(TZ=Europe/Moscow date "+%Y%m%d%H%M")" >> $GITHUB_ENV
        sudo apt update
        sudo apt install git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 lib32ncurses5-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python2 python3
        mkdir -p $GITHUB_WORKSPACE/action_dir

    - name: Cloning Proton Clang
      run: |
        cd $GITHUB_WORKSPACE/action_dir
        git clone https://github.com/kdrag0n/proton-clang --depth=1

    - name: Cloning kernel tree
      run: |
        cd $GITHUB_WORKSPACE/action_dir
        git clone https://github.com/crdroidandroid/android_kernel_xiaomi_mt6768 -b 13.0 kernel_tree --depth=1

    - name: Installing KernelSU v3.2.4
      run: |
        cd $GITHUB_WORKSPACE/action_dir/kernel_tree
        curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s v3.2.4
        wget -P $GITHUB_WORKSPACE/ https://raw.githubusercontent.com/xiaoleGun/KernelSU_Action/main/patches/patches.sh
        bash $GITHUB_WORKSPACE/patches.sh

    - name: Patching kernel tree for SUSFS support (v3.x compatible)
      run: |
        cd $GITHUB_WORKSPACE/action_dir/kernel_tree

        # Copy susfs source files into kernel tree
        cp $GITHUB_WORKSPACE/susfs_files/susfs.c fs/
        cp $GITHUB_WORKSPACE/susfs_files/susfs.h include/linux/

        # Apply kernel VFS hooks patch (Linux 4.14 - works independently of KSU version)
        patch -p1 -F 3 < $GITHUB_WORKSPACE/susfs_files/50_add_susfs_in_kernel-4.14.patch

        # Fix rejected hunk in fs/open.c caused by patches.sh modifying same area
        if [ -f "fs/open.c.rej" ]; then
          echo "[+] Fixing rejected hunk in fs/open.c..."
          # Add SUSFS variable declarations after 'unsigned int lookup_flags = LOOKUP_FOLLOW;'
          # (the patches.sh already added ksu_handle_faccessat so context shifted)
          sed -i '/unsigned int lookup_flags = LOOKUP_FOLLOW;$/a \\n#ifdef CONFIG_KSU_SUSFS_SUS_PATH\n       struct filename* fname;\n       int status;\n       int error;\n#endif' fs/open.c
          # Add SUSFS path check before 'if (mode & ~S_IRWXO)'
          sed -i '/if (mode & ~S_IRWXO)/i #ifdef CONFIG_KSU_SUSFS_SUS_PATH\n       fname = getname_safe(filename);\n       status = susfs_sus_path_by_filename(fname, &error, SYSCALL_FAMILY_ALL_ENOENT);\n       putname_safe(fname);\n       if (status) {\n              return error;\n       }\n#endif' fs/open.c
          rm -f fs/open.c.rej
          echo "  Done fixing fs/open.c."
        fi

        # Run manual v3.x integration script (replaces old 10_enable_susfs_for_ksu.patch)
        bash $GITHUB_WORKSPACE/susfs_files/patch_ksu_v3x_for_susfs.sh

        # Add SUSFS configs to defconfig
        echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/lancelot_defconfig
        echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> arch/arm64/configs/lancelot_defconfig
        echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> arch/arm64/configs/lancelot_defconfig
        echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> arch/arm64/configs/lancelot_defconfig
        echo "CONFIG_KSU_SUSFS_SUS_MAPS=y" >> arch/arm64/configs/lancelot_defconfig
        echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> arch/arm64/configs/lancelot_defconfig
        echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> arch/arm64/configs/lancelot_defconfig
        echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> arch/arm64/configs/lancelot_defconfig

    - name: Building kernel
      run: |
        cd $GITHUB_WORKSPACE/action_dir/kernel_tree
        export PATH=$GITHUB_WORKSPACE/action_dir/proton-clang/bin:$PATH
        export KBUILD_BUILD_HOST=github
        export KBUILD_BUILD_USER=BadSoul_SFC

        make -j$(nproc --all) CC=clang O=out ARCH=arm64 LD=ld.lld CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- lancelot_defconfig
        make -j$(nproc --all) CC=clang O=out ARCH=arm64 LD=ld.lld CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: Creating update.zip (AnyKernel3)
      run: |
        cd $GITHUB_WORKSPACE/action_dir
        git clone https://github.com/osm0sis/AnyKernel3 --depth=1 AnyKernel3
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        sed -i 's|BLOCK=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;|BLOCK=auto;|g' AnyKernel3/anykernel.sh
        sed -i 's/is_slot_device=0;/is_slot_device=auto;/g' AnyKernel3/anykernel.sh
        cp kernel_tree/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
        rm -rf AnyKernel3/.git* AnyKernel3/README.md

    - name: Uploading update.zip
      uses: actions/upload-artifact@v4
      with:
        name: KSU-SUSFS-${{ env.BUILD_TIME }}-lancelot-13
        path: action_dir/AnyKernel3/*
