name: Build Redmi9 KernelSU-Next SUSFS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          echo "BUILD_TIME=$(TZ=Asia/Shanghai date '+%Y%m%d-%H%M')" >> $GITHUB_ENV

          sudo apt update

          sudo apt install -y \
            git curl wget zip unzip rsync bc ccache \
            build-essential flex bison gperf gcc-multilib \
            g++-multilib libc6-dev-i386 lib32ncurses5-dev \
            lib32z1-dev libelf-dev libssl-dev \
            python3 device-tree-compiler p7zip-full

          mkdir -p $GITHUB_WORKSPACE/workdir

      - name: Clone Kernel Source
        run: |
          cd $GITHUB_WORKSPACE/workdir

          git clone \
            --depth=1 \
            -b 13.0 \
            https://github.com/crdroidandroid/android_kernel_xiaomi_mt6768 \
            kernel_tree

      - name: Clone Proton Clang
        run: |
          cd $GITHUB_WORKSPACE/workdir

          git clone \
            --depth=1 \
            https://github.com/kdrag0n/proton-clang

      - name: Integrate KernelSU-Next
        run: |
          cd $GITHUB_WORKSPACE/workdir/kernel_tree

          curl -LSs \
          "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/refs/heads/legacy-susfs/kernel/setup.sh" \
          | bash -

      - name: Clone SUSFS
        run: |
          cd $GITHUB_WORKSPACE/workdir

          git clone \
            --depth=1 \
            -b kernel-4.14 \
            https://gitlab.com/simonpunk/susfs4ksu.git

      - name: Apply SUSFS
        run: |
          cd $GITHUB_WORKSPACE/workdir

          cp -r \
            susfs4ksu/kernel_patches/fs/* \
            kernel_tree/fs/

          cp \
            susfs4ksu/kernel_patches/include/linux/susfs.h \
            kernel_tree/include/linux/

          cp \
            susfs4ksu/kernel_patches/include/linux/susfs_def.h \
            kernel_tree/include/linux/

          cd kernel_tree

          grep -q "susfs.o" fs/Makefile || \
          echo 'obj-y += susfs.o' >> fs/Makefile

          if ! grep -q "config KSU_SUSFS" fs/Kconfig; then
            echo '' >> fs/Kconfig
            echo 'config KSU_SUSFS' >> fs/Kconfig
            echo '    bool "KernelSU SUSFS"' >> fs/Kconfig
            echo '    default y' >> fs/Kconfig
            echo '' >> fs/Kconfig
          fi

      - name: Android13 SUSFS Fix
        run: |
          cd $GITHUB_WORKSPACE/workdir/kernel_tree

          grep -q "linux/nsproxy.h" fs/susfs.c || \
          sed -i '1i #include <linux/nsproxy.h>' fs/susfs.c

          grep -q "linux/mount.h" fs/susfs.c || \
          sed -i '1i #include <linux/mount.h>' fs/susfs.c

          grep -q "linux/fs_struct.h" fs/susfs.c || \
          sed -i '1i #include <linux/fs_struct.h>' fs/susfs.c

          sed -i 's/task->nsproxy/current->nsproxy/g' fs/susfs.c || true

          sed -i 's/path_umount/path_put/g' fs/susfs.c || true

          sed -i 's/mntget/path_get/g' fs/susfs.c || true

      - name: Disable KPROBES
        run: |
          cd $GITHUB_WORKSPACE/workdir/kernel_tree

          find KernelSU -type f | while read file; do
            sed -i \
            's/#ifdef CONFIG_KPROBES/#if defined(CONFIG_KPROBES) \&\& 0/g' \
            "$file" || true
          done

      - name: Enable Kernel Config
        run: |
          cd $GITHUB_WORKSPACE/workdir/kernel_tree

          DEFCONFIG=arch/arm64/configs/lancelot_defconfig

          echo 'CONFIG_KSU=y' >> $DEFCONFIG
          echo 'CONFIG_KSU_MANUAL_HOOK=y' >> $DEFCONFIG

          echo 'CONFIG_KSU_SUSFS=y' >> $DEFCONFIG
          echo 'CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y' >> $DEFCONFIG
          echo 'CONFIG_KSU_SUSFS_SPOOF_UNAME=y' >> $DEFCONFIG

          echo 'CONFIG_OVERLAY_FS=y' >> $DEFCONFIG

          echo 'CONFIG_TMPFS=y' >> $DEFCONFIG
          echo 'CONFIG_TMPFS_XATTR=y' >> $DEFCONFIG

          echo 'CONFIG_KALLSYMS=y' >> $DEFCONFIG
          echo 'CONFIG_KALLSYMS_ALL=y' >> $DEFCONFIG

          echo 'CONFIG_KPROBES=n' >> $DEFCONFIG
          echo 'CONFIG_HAVE_KPROBES=n' >> $DEFCONFIG

      - name: Build Kernel
        run: |
          cd $GITHUB_WORKSPACE/workdir/kernel_tree

          export PATH=$GITHUB_WORKSPACE/workdir/proton-clang/bin:$PATH

          export ARCH=arm64
          export SUBARCH=arm64

          export KBUILD_BUILD_HOST=GitHub
          export KBUILD_BUILD_USER=KernelSU

          make O=out ARCH=arm64 lancelot_defconfig

          make -j$(nproc --all) \
            O=out \
            ARCH=arm64 \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            2>&1 | tee build.log

      - name: Verify KernelSU
        run: |
          cd $GITHUB_WORKSPACE/workdir/kernel_tree

          strings out/arch/arm64/boot/Image.gz-dtb | grep "KernelSU" || true

          strings out/arch/arm64/boot/Image.gz-dtb | grep "susfs" || true

      - name: Clone AnyKernel3
        run: |
          cd $GITHUB_WORKSPACE/workdir

          git clone \
            --depth=1 \
            https://github.com/osm0sis/AnyKernel3

      - name: Prepare AnyKernel3
        run: |
          cd $GITHUB_WORKSPACE/workdir/AnyKernel3

          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh

          cp \
            ../kernel_tree/out/arch/arm64/boot/Image.gz-dtb \
            ./

      - name: Verify AnyKernel3
        run: |
          cd $GITHUB_WORKSPACE/workdir/AnyKernel3

          test -f META-INF/com/google/android/update-binary

      - name: Create Flashable ZIP
        run: |
          cd $GITHUB_WORKSPACE/workdir

          mkdir -p release

          cd AnyKernel3

          chmod -R 755 META-INF
          chmod 755 anykernel.sh
          chmod -R 755 tools

          rm -rf .git

          zip -r9 \
            ../release/Redmi9-KSU-SUSFS-${BUILD_TIME}.zip \
            * \
            -x "*.git*" \
            -x "*README*"

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Redmi9-KSU-SUSFS-${{ env.BUILD_TIME }}
          path: |
            workdir/release/*.zip

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            workdir/kernel_tree/build.log